name: weekly-brand-tracker

on:
  push:
    paths:
      - "panel/**"                # rebuild whenever you add/edit a weekly CSV
  workflow_dispatch: {}            # run on demand from the Actions tab
  schedule:
    - cron: "0 13 * * 1"          # Monday backstop (rebuilds from existing CSVs)

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt

      - name: Scrape + compute metrics
        env:
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
        run: python run_weekly.py

      - name: Build dashboard
        run: python build_site.py

      - name: Commit computed reports back
        run: |
          git config user.name  "brand-tracker-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/tracker.db reports/ || true
          git commit -m "Rebuild metrics $(date -u +%F)" || echo "nothing to commit"
          git push || echo "push skipped"

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
